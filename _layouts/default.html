<!doctype html>
<html lang="{{ page.lang | default: 'en' }}">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{ page.title | default: site.title }}</title>
  <link rel="icon" type="image/png" href="{{ page.asset_prefix | default: "" }}assets/icons/daysgain.png">
  <link rel="apple-touch-icon" href="{{ page.asset_prefix | default: "" }}assets/icons/daysgain.png">
  {% if page.alternate_url %}
  <link rel="alternate" hreflang="{{ page.lang | default: 'en' }}" href="{{ site.url }}{{ page.url }}">
  <link rel="alternate" hreflang="{{ page.alternate_lang | default: 'en' }}" href="{{ page.alternate_url }}">
  {% endif %}
  <style>
    body {
      margin: 0;
      padding: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
      line-height: 1.6;
      color: #24292f;
      background: #ffffff;
    }

    header {
      border-bottom: 1px solid #d8dee4;
      background: #ffffff;
    }

    .topbar {
      max-width: 820px;
      margin: 0 auto;
      padding: 18px 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
    }

    .brand {
      display: inline-flex;
      align-items: center;
      color: #24292f;
      text-decoration: none;
    }

    .brand:hover {
      text-decoration: none;
    }

    .brand-logo {
      display: block;
      width: 136px;
      height: 38px;
      object-fit: contain;
      object-position: center;
    }

    .language-switch {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      font-size: 14px;
      font-weight: 600;
      color: #57606a;
      white-space: nowrap;
    }

    .language-switch a {
      padding: 5px 10px;
      border: 1px solid #d0d7de;
      border-radius: 999px;
      color: #0969da;
      background: #f6f8fa;
      text-decoration: none;
    }

    .language-switch a:hover {
      background: #eef4ff;
      text-decoration: none;
    }

    main {
      max-width: 820px;
      margin: 0 auto;
      padding: 32px 20px 56px;
    }

    h1 {
      font-size: 2.1rem;
      line-height: 1.2;
      margin-top: 0;
      margin-bottom: 24px;
      padding-bottom: 12px;
      border-bottom: 1px solid #d8dee4;
    }

    h2 {
      font-size: 1.45rem;
      margin-top: 32px;
      padding-bottom: 8px;
      border-bottom: 1px solid #d8dee4;
    }

    h3 {
      font-size: 1.15rem;
      margin-top: 24px;
    }

    p {
      margin: 16px 0;
    }

    a {
      color: #0969da;
      text-decoration: none;
    }

    a:hover {
      text-decoration: underline;
    }

    code {
      background: rgba(175, 184, 193, 0.2);
      padding: 0.2em 0.4em;
      border-radius: 6px;
      font-size: 85%;
    }

    pre {
      overflow-x: auto;
      background: #f6f8fa;
      padding: 16px;
      border-radius: 8px;
    }

    pre code {
      background: transparent;
      padding: 0;
    }

    table {
      display: block;
      width: 100%;
      overflow-x: auto;
      border-collapse: collapse;
      margin: 16px 0;
    }

    th, td {
      border: 1px solid #d0d7de;
      padding: 8px 10px;
      text-align: left;
      vertical-align: top;
    }

    th {
      background: #f6f8fa;
      font-weight: 600;
    }

    @media (max-width: 600px) {
      main {
        padding: 24px 16px 48px;
      }

      .topbar {
        padding: 12px 16px;
      }

      h1 {
        font-size: 1.8rem;
      }

      h2 {
        font-size: 1.3rem;
      }
    }
  </style>
</head>
<body>
  <header>
    <div class="topbar">
      <a class="brand" href="{{ page.home_url | default: 'https://daysgain.com/' }}" target="_blank" rel="noopener noreferrer">
        <img class="brand-logo" src="{{ page.asset_prefix | default: "" }}assets/brand/daysgain-logo-light.png" alt="DaysGain">
      </a>
      {% if page.alternate_url %}
      <div class="language-switch" aria-label="Language switcher">
        <span>{{ page.current_language | default: 'English' }}</span>
        <a href="{{ page.alternate_url }}" data-same-tab>{{ page.alternate_label }}</a>
      </div>
      {% endif %}
    </div>
  </header>

  <main>
    {{ content }}
  </main>

  <script>
    document.querySelectorAll('a[href]:not([href^="#"]):not([data-same-tab])').forEach((link) => {
      link.target = "_blank";
      link.rel = "noopener noreferrer";
    });
  </script>
</body>
</html>
