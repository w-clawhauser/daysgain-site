<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{ page.title | default: site.title }}</title>
  <style>
    body {
      margin: 0;
      padding: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
      line-height: 1.6;
      color: #24292f;
      background: #ffffff;
    }

    main {
      max-width: 820px;
      margin: 0 auto;
      padding: 32px 20px 56px;
    }

    h1 {
      font-size: 2.1rem;
      line-height: 1.2;
      margin-top: 0;
      margin-bottom: 24px;
      padding-bottom: 12px;
      border-bottom: 1px solid #d8dee4;
    }

    h2 {
      font-size: 1.45rem;
      margin-top: 32px;
      padding-bottom: 8px;
      border-bottom: 1px solid #d8dee4;
    }

    h3 {
      font-size: 1.15rem;
      margin-top: 24px;
    }

    p {
      margin: 16px 0;
    }

    a {
      color: #0969da;
      text-decoration: none;
    }

    a:hover {
      text-decoration: underline;
    }

    code {
      background: rgba(175, 184, 193, 0.2);
      padding: 0.2em 0.4em;
      border-radius: 6px;
      font-size: 85%;
    }

    pre {
      overflow-x: auto;
      background: #f6f8fa;
      padding: 16px;
      border-radius: 8px;
    }

    pre code {
      background: transparent;
      padding: 0;
    }

    table {
      display: block;
      width: 100%;
      overflow-x: auto;
      border-collapse: collapse;
      margin: 16px 0;
    }

    th, td {
      border: 1px solid #d0d7de;
      padding: 8px 10px;
      text-align: left;
      vertical-align: top;
    }

    th {
      background: #f6f8fa;
      font-weight: 600;
    }

    @media (max-width: 600px) {
      main {
        padding: 24px 16px 48px;
      }

      h1 {
        font-size: 1.8rem;
      }

      h2 {
        font-size: 1.3rem;
      }
    }
  </style>
</head>
<body>
  <main>
    {{ content }}
  </main>
</body>
</html>
